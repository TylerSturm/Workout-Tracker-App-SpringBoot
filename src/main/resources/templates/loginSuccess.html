<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login Success</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", "Segoe UI", system-ui, sans-serif;
            background-color: #f5f4f0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #1a1a1a;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 380px;
            padding: 48px 40px 40px;
            border-radius: 4px;
            border: 1px solid #e0dfd9;
            text-align: center;
        }

        .icon {
            width: 40px;
            height: 40px;
            background: #f0faf4;
            border: 1px solid #c6e8d3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 18px;
        }

        h1 {
            font-size: 18px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        p {
            font-size: 13px;
            color: #888;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 11px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
        }

        .btn:hover { background: #333; }
        .btn:active { background: #000; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">✓</div>
    <h1>You're signed in</h1>
    <p>Welcome back. Let's pick up where you left off.</p>

    <form th:action="@{/home}" method="get">
        <button type="submit" class="btn">Go to home</button>
    </form>
</div>

</body>
</html>
