<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", "Segoe UI", system-ui, sans-serif;
            background-color: #f5f4f0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #1a1a1a;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 48px 40px 40px;
            border-radius: 4px;
            border: 1px solid #e0dfd9;
        }

        .brand {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 22px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 28px;
            letter-spacing: -0.3px;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d8d7d2;
            border-radius: 3px;
            background: #fafaf8;
            color: #1a1a1a;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
            outline: none;
        }

        input::placeholder { color: #aaa; }

        input:focus {
            border-color: #1a1a1a;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(26,26,26,0.07);
        }

        .btn {
            width: 100%;
            margin-top: 8px;
            padding: 11px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn:hover { background: #333; }
        .btn:active { background: #000; }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            text-decoration: none;
        }

        .footer-link span {
            color: #1a1a1a;
            font-weight: 500;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .footer-link:hover span { color: #555; }
    </style>
</head>
<body>

<div class="card">
    <p class="brand">TrackerApp</p>
    <h1>Sign in</h1>

    <form th:action="@{/login}" method="post">
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>

        <button type="submit" class="btn">Continue</button>
    </form>

    <a th:href="@{/signup}" class="footer-link">
        No account? <span>Create one</span>
    </a>
</div>

</body>
</html>
